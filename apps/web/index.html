<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="icon" type="image/jpg" href="/favicon_io/favicon.jpg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png" />
    <link rel="manifest" href="/favicon_io/site.webmanifest" />
    <script>
      (() => {
        const storageKey = "knowledge-chatbox-theme";
        const root = document.documentElement;

        try {
          const storedTheme = localStorage.getItem(storageKey) ?? "system";
          const isDark =
            storedTheme === "dark" ||
            (storedTheme === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);

          document.documentElement.classList.toggle("dark", isDark);
          root.style.colorScheme = isDark ? "dark" : "light";
        } catch {
          document.documentElement.classList.remove("dark");
          root.style.colorScheme = "light";
        }
      })();
    </script>
    <title>Knowledge Chatbox</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
