name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v6
        with:
          python-version-file: apps/api/.python-version

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (ruff check)
        run: uv run ruff check

      - name: Format check (ruff format)
        run: uv run ruff format --check

      - name: Type check (basedpyright)
        run: uv run basedpyright

      - name: Type check tests (basedpyright)
        run: uv run basedpyright --project pyproject.test.toml

      - name: Test
        run: uv run --group dev python -m pytest
        env:
          JWT_SECRET_KEY: "test-jwt-secret-key-for-ci-32chars"
          INITIAL_ADMIN_PASSWORD: "CiTest123456"

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          working-directory: apps/web
          cache: true
          run-install: true

      - name: OpenAPI schema check
        run: vp run api:check

      - name: Lint + type check
        run: vp check --fix

      - name: Test
        run: vp test

      - name: Build
        run: vp build

  repo-surface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v6
        with:
          python-version-file: apps/api/.python-version

      - name: Repo surface check
        run: uv run --project apps/api python scripts/check_repo_surface.py
